<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Pokédex</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      @keyframes slideInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
      .card{animation:slideInUp .4s ease forwards}
      .card:nth-child(1){animation-delay:.05s}
      .card:nth-child(2){animation-delay:.1s}
      .card:nth-child(3){animation-delay:.15s}
      .card:nth-child(4){animation-delay:.2s}
      .card:nth-child(n+5){animation-delay:.25s}
    </style>
  </head>
  <body>
    <header class="header">
      <h1>Pokédex do joaozitos</h1>
      <div style="display:flex;gap:1rem;align-items:center">
        <input id="search" type="search" placeholder="Pesquisar por nome ou #" autocomplete="off" />
        <button id="theme-toggle" class="theme-btn" aria-label="Alternar tema">🌙</button>
      </div>
    </header>

    <div class="gen-bar-wrap">
      <div id="gen-bar" class="gen-bar" role="tablist" aria-label="Gerações"></div>
    </div>

    <main id="pokedex" class="grid" role="list"></main>

    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <button id="close" class="close">×</button>
        <div id="modal-body"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
